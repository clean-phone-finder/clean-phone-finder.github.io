<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prompt generator: Find smartphone without annoying features</title>
  <meta name="description" content="Generate a strict, evidence-based prompt to choose a smartphone without ads, spyware, adware, and known hardware or software issues, based on real user discussions and reviews.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
      --muted: #666666;
      --border: #dddddd;
      --accent: #2563eb;
      --card: #f7f7f7;
    }
    [data-theme="dark"] {
      --bg: #0f1115;
      --fg: #e5e7eb;
      --muted: #9ca3af;
      --border: #2a2f3a;
      --accent: #60a5fa;
      --card: #161a22;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.2rem;
      margin: 0;
    }
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 0.4rem 0.7rem;
      border-radius: 6px;
      cursor: pointer;
    }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
      color: var(--muted);
    }
    input, textarea {
      width: 100%;
      padding: 0.6rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--fg);
      font-size: 0.95rem;
    }
    textarea {
      min-height: 260px;
      resize: vertical;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }
    @media (min-width: 700px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.5rem;
    }
    button.copy {
      background: var(--accent);
      color: #ffffff;
      border: none;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    section.links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .ai-link, .post-link {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--fg);
      background: var(--card);
    }
    .ai-link img {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }
    footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--muted);
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Prompt generator: Find smartphone without annoying features</h1>
    <button class="theme-toggle" id="themeToggle">Toggle theme</button>
  </header>

  <main>
    <div class="card">
      <div class="grid">
        <div>
          <label for="modelInput">Smartphone model (optional)</label>
          <input id="modelInput" list="models" placeholder="e.g. Galaxy A36">
          <datalist id="models"></datalist>
        </div>
        <div>
          <label for="countryInput">Country / region (optional)</label>
          <input id="countryInput" list="countries" placeholder="e.g. Germany">
          <datalist id="countries"></datalist>
        </div>
        <div>
          <label for="languageInput">Response language (optional)</label>
          <input id="languageInput" list="languages" placeholder="e.g. English">
          <datalist id="languages"></datalist>
        </div>
      </div>
    </div>

    <div class="card">
      <label for="result">Generated prompt</label>
      <textarea id="result" readonly></textarea>
      <div class="actions">
        <button class="copy" id="copyBtn">Copy</button>
      </div>
    </div>

    <section class="links">
      <a class="ai-link" href="https://chat.openai.com/" target="_blank" rel="noopener">
        <img src="./assets/images/openai-chatgpt-color-icon.svg" alt="ChatGPT">
        <span>ChatGPT</span>
      </a>
      <a class="ai-link" href="https://gemini.google.com/" target="_blank" rel="noopener">
        <img src="./assets/images/google-gemini-color-icon.svg" alt="Gemini">
        <span>Gemini</span>
      </a>
      <a class="ai-link" href="https://copilot.microsoft.com/" target="_blank" rel="noopener">
        <img src="./assets/images/microsoft-copilot-color-icon.svg" alt="Copilot">
        <span>Copilot</span>
      </a>
      <a class="ai-link" href="https://claude.ai/" target="_blank" rel="noopener">
        <img src="./assets/images/anthropic-claude-color-icon.svg" alt="Claude">
        <span>Claude</span>
      </a>
    </section>

    <section class="links">
      <a class="post-link" href="#" aria-disabled="true">Discussion: How this prompt generator works</a>
      <a class="post-link" href="#" aria-disabled="true">User feedback and real-world cases</a>
      <a class="post-link" href="#" aria-disabled="true">Known limitations and future updates</a>
    </section>

    <footer>
      <p>
        Source code:
        <a href="#" target="_blank" rel="noopener">GitHub repository</a>
      </p>
    </footer>
  </main>

  <script>
    const modelsList = [
      "Galaxy A36",
      "Galaxy S23",
      "Pixel 7",
      "Pixel 8",
      "iPhone 13",
      "iPhone 14"
    ];

    const countriesList = [
      "United States",
      "Germany",
      "United Kingdom",
      "Canada",
      "India",
      "Japan"
    ];

    const languagesList = [
      "English",
      "German",
      "Ukrainian",
      "Spanish",
      "French",
      "Turkish"
    ];

    function fillDatalist(id, items) {
      const dl = document.getElementById(id);
      dl.innerHTML = "";
      items.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item;
        dl.appendChild(opt);
      });
    }

    fillDatalist("models", modelsList);
    fillDatalist("countries", countriesList);
    fillDatalist("languages", languagesList);

    const modelInput = document.getElementById("modelInput");
    const countryInput = document.getElementById("countryInput");
    const languageInput = document.getElementById("languageInput");
    const resultArea = document.getElementById("result");

    function generatePrompt() {
      const model = modelInput.value.trim();
      const country = countryInput.value.trim();
      const language = languageInput.value.trim();

      let paragraphs = [];

      let intro = "You are an AI assistant tasked with helping to choose a smartphone for everyday use without intrusive advertising, spyware, adware, or aggressive background services that can install applications without a clear way for the user to stop them.";
      paragraphs.push(intro);

      if (model && country) {
        paragraphs.push(
          "Focus specifically on the smartphone model \"" + model + "\" as it is sold and used in " + country + ". Analyze both hardware and software reliability, including overheating, throttling, battery degradation, component stability, system freezes, crashes, unstable updates, firmware bugs, long-term performance degradation, and any reports of forced or non-removable applications. Take into account regional firmware differences, carrier or region-specific modifications, and local availability."
        );
      } else if (model) {
        paragraphs.push(
          "Focus specifically on the smartphone model \"" + model + "\". Analyze verified user reports about hardware and software issues, including overheating, throttling, battery problems, instability, system freezes, crashes, buggy updates, performance degradation over time, and any complaints about ads, spyware, adware, or forced application installation. Consider how long this model has been on the market and whether there is sufficient independent feedback."
        );
      } else if (country) {
        paragraphs.push(
          "Focus on smartphones available in " + country + ". Take into account regional availability, firmware variants, regulatory or carrier restrictions, and region-specific user complaints. Highlight patterns reported by users in this region while still comparing with global feedback."
        );
      } else {
        paragraphs.push(
          "Provide a worldwide comparison of smartphones suitable for everyday use. Base the analysis on real user discussions and long-term ownership reports rather than specifications or marketing materials."
        );
      }

      paragraphs.push(
        "You must rely only on real, publicly available user reports and discussions. Reddit is a mandatory source and must be explicitly used, but it must not be the only source. Other public forums, issue trackers, and long-term user reviews may be included if they provide verifiable information."
      );

      paragraphs.push(
        "If a smartphone model has been on the market for less than one year, clearly warn that there may be insufficient independent feedback and that conclusions may be premature. In such cases, suggest alternative models with a longer and more stable track record that do not suffer from the same reported issues."
      );

      paragraphs.push(
        "Strictly do not fabricate facts, do not make assumptions without sources, and do not present unverified claims. If reliable information is not available, explicitly state that it cannot be confirmed."
      );

      if (language) {
        paragraphs.push(
          "Provide the entire response strictly in " + language + ", regardless of the language of the sources."
        );
      } else {
        paragraphs.push(
          "Provide the response in English."
        );
      }

      resultArea.value = paragraphs.join("\n\n");
    }

    modelInput.addEventListener("input", generatePrompt);
    countryInput.addEventListener("input", generatePrompt);
    languageInput.addEventListener("input", generatePrompt);

    generatePrompt();

    document.getElementById("copyBtn").addEventListener("click", () => {
      resultArea.select();
      document.execCommand("copy");
    });

    const themeToggle = document.getElementById("themeToggle");
    const root = document.documentElement;

    function setTheme(theme) {
      root.setAttribute("data-theme", theme);
      localStorage.setItem("theme", theme);
    }

    themeToggle.addEventListener("click", () => {
      const current = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
      setTheme(current);
    });

    const savedTheme = localStorage.getItem("theme");
    if (savedTheme) {
      setTheme(savedTheme);
    }
  </script>
</body>
</html>
