<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prompt generator: Find smartphone without annoying features</title>
  <meta name="description" content="Generate a strict, evidence-based AI prompt for choosing a smartphone without intrusive ads, spyware, adware, or long-term hardware and software issues, based on real user discussions and reviews." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --border: #dddddd;
      --accent: #2563eb;
      --card: #f9f9f9;
    }

    [data-theme="dark"] {
      --bg: #0f0f0f;
      --text: #f2f2f2;
      --muted: #aaaaaa;
      --border: #2a2a2a;
      --accent: #60a5fa;
      --card: #161616;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 1.25rem;
      margin: 0;
    }

    .theme-toggle {
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 4px;
      color: var(--muted);
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
    }

    input {
      margin-bottom: 12px;
    }

    textarea {
      min-height: 260px;
      resize: vertical;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .copy-btn {
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 24px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      background: var(--card);
    }

    .link-card img {
      width: 28px;
      height: 28px;
    }

    footer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--muted);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .post-links a {
      display: block;
      margin-bottom: 6px;
    }
  </style>
</head>
<body data-theme="light">
  <header>
    <h1>Prompt generator: Find smartphone without annoying features</h1>
    <button class="theme-toggle" id="themeToggle">Switch theme</button>
  </header>

  <main>
    <div class="card">
      <label for="phoneInput">Smartphone model (optional)</label>
      <input id="phoneInput" list="phoneList" placeholder="Example: Samsung Galaxy A36" />
      <datalist id="phoneList"></datalist>

      <label for="countryInput">Country or region (optional)</label>
      <input id="countryInput" list="countryList" placeholder="Example: Germany" />
      <datalist id="countryList"></datalist>

      <label for="languageInput">Response language (optional)</label>
      <input id="languageInput" list="languageList" placeholder="Example: English" />
      <datalist id="languageList"></datalist>
    </div>

    <div class="card">
      <label for="result">Generated prompt</label>
      <textarea id="result" readonly></textarea>
      <div class="actions">
        <button class="copy-btn" id="copyBtn">Copy</button>
      </div>
    </div>

    <div class="links">
      <a class="link-card" href="https://chat.openai.com/" target="_blank" rel="noopener">
        <img src="./assets/images/openai-chatgpt-color-icon.svg" alt="ChatGPT" />
        <span>ChatGPT</span>
      </a>
      <a class="link-card" href="https://gemini.google.com/" target="_blank" rel="noopener">
        <img src="./assets/images/google-gemini-color-icon.svg" alt="Gemini" />
        <span>Gemini</span>
      </a>
      <a class="link-card" href="https://copilot.microsoft.com/" target="_blank" rel="noopener">
        <img src="./assets/images/microsoft-copilot-color-icon.svg" alt="Copilot" />
        <span>Copilot</span>
      </a>
      <a class="link-card" href="https://claude.ai/" target="_blank" rel="noopener">
        <img src="./assets/images/anthropic-claude-color-icon.svg" alt="Claude" />
        <span>Claude</span>
      </a>
    </div>

    <footer>
      <div class="post-links">
        <strong>Related posts and discussions:</strong>
        <a href="#">How this prompt generator was created</a>
        <a href="#">Discussion: smartphones with intrusive software</a>
        <a href="#">User feedback and real-world results</a>
      </div>
      <div style="margin-top: 12px;">
        <a href="#">Source code on GitHub</a>
      </div>
    </footer>
  </main>

  <script>
    const phoneModels = [
      "Samsung Galaxy A36",
      "Samsung Galaxy S23",
      "Google Pixel 7",
      "Google Pixel 8",
      "Xiaomi Redmi Note 13",
      "Motorola Edge 40"
    ];

    const countries = [
      "United States",
      "Germany",
      "United Kingdom",
      "France",
      "India",
      "Turkey",
      "Japan"
    ];

    const languages = [
      "English",
      "Ukrainian",
      "German",
      "French",
      "Spanish",
      "Turkish"
    ];

    function fillDatalist(id, items) {
      const list = document.getElementById(id);
      items.forEach(item => {
        const option = document.createElement("option");
        option.value = item;
        list.appendChild(option);
      });
    }

    fillDatalist("phoneList", phoneModels);
    fillDatalist("countryList", countries);
    fillDatalist("languageList", languages);

    const phoneInput = document.getElementById("phoneInput");
    const countryInput = document.getElementById("countryInput");
    const languageInput = document.getElementById("languageInput");
    const result = document.getElementById("result");

    function generatePrompt() {
      const phone = phoneInput.value.trim();
      const country = countryInput.value.trim();
      const language = languageInput.value.trim();

      let responseLanguage = language ? language : "English";

      let prompt = "";
      prompt += "Respond in " + responseLanguage + ".\n\n";

      prompt += "You are an AI assistant tasked with providing a strict, evidence-based analysis of smartphones for everyday use, with a strong focus on long-term reliability and user experience.\n\n";

      if (!phone && !country) {
        prompt += "Analyze and recommend smartphones available worldwide that do not contain intrusive advertising, spyware, adware, or systems that aggressively install applications without clear user consent.\n\n";
      }

      if (phone && !country) {
        prompt += "Analyze the smartphone model \"" + phone + "\" in detail.\n\n";
      }

      if (!phone && country) {
        prompt += "Analyze smartphones available in " + country + ", taking into account regional availability, firmware differences, restrictions, and region-specific user complaints.\n\n";
      }

      if (phone && country) {
        prompt += "Analyze the smartphone model \"" + phone + "\" specifically for the market in " + country + ", taking into account regional firmware, restrictions, availability, and user complaints.\n\n";
      }

      prompt += "Your analysis must be based only on real user reports, long-term usage experiences, and public discussions. Reddit must be used as a mandatory source, but not the only one.\n\n";

      prompt += "Explicitly investigate and report verified evidence of:\n";
      prompt += "intrusive advertising, spyware, adware, forced or automatic app installations, lack of user control, hardware issues such as overheating, throttling, battery degradation, component failures, and software issues including freezes, crashes, unstable updates, firmware bugs, and performance degradation over time.\n\n";

      prompt += "If the analyzed smartphone model is less than one year old, clearly warn that there may be insufficient independent long-term reviews and state this limitation explicitly.\n\n";

      prompt += "If serious issues are identified, suggest alternative models that do not suffer from the same problems, based on verified user reports.\n\n";

      prompt += "You must not invent facts, make assumptions without sources, or present unverified information. Do not use marketing language. Do not generalize. Base every claim on real user discussions and reports.\n\n";

      prompt += "Structure the response in clear, readable paragraphs separated by blank lines. Use plain text only, without emojis, without HTML, without Markdown, and without any special formatting.";

      result.value = prompt;
    }

    phoneInput.addEventListener("input", generatePrompt);
    countryInput.addEventListener("input", generatePrompt);
    languageInput.addEventListener("input", generatePrompt);

    generatePrompt();

    document.getElementById("copyBtn").addEventListener("click", () => {
      result.select();
      document.execCommand("copy");
    });

    const themeToggle = document.getElementById("themeToggle");
    themeToggle.addEventListener("click", () => {
      const body = document.body;
      body.dataset.theme = body.dataset.theme === "light" ? "dark" : "light";
    });
  </script>
</body>
</html>
