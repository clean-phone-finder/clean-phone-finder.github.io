    /* ===== DESIGN SYSTEM ===== */
    :root {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #e0e0e0;
      --text-primary: #111111;
      --text-secondary: #666666;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-text: #ffffff;
      --radius: 8px;
      --font: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    [data-theme="dark"] {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text-primary: #f0f0f0;
      --text-secondary: #999999;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-text: #ffffff;
    }

    /* ===== BASE RESET ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.6;
      background-color: var(--bg);
      color: var(--text-primary);
      transition: background-color 0.2s ease, color 0.2s ease;
      min-height: 100vh;
    }

    /* ===== PROGRESS BAR ===== */
    #progressBar {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: var(--accent);
      transition: width 0.3s ease;
      z-index: 1000;
      pointer-events: none;
    }

    /* ===== THEME TOGGLE ===== */
    #themeToggle {
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: var(--radius);
      padding: 7px 14px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: var(--font);
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      z-index: 999;
      line-height: 1.4;
    }
    #themeToggle:hover { background: var(--border); }

    /* ===== LAYOUT ===== */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 24px 64px;
    }

    /* ===== SCREENS ===== */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ===== STEP INDICATOR ===== */
    .step-indicator {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    /* ===== HEADINGS ===== */
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .hint {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    /* ===== CHIPS ===== */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 4px;
    }

    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: var(--radius);
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: var(--font);
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      line-height: 1.4;
    }
    .chip:hover:not(.active) { border-color: var(--accent); }
    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--accent-text);
    }

    /* ===== OTHER — PHONE (with Add button) ===== */
    .other-row {
      display: none;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
    }
    .other-row.visible { display: flex; }

    .other-row input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text-primary);
      font-size: 0.875rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s ease;
    }
    .other-row input:focus { border-color: var(--accent); }

    /* ===== TAGS ===== */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 12px;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
    }

    .tag-remove {
      cursor: pointer;
      color: var(--text-secondary);
      background: none;
      border: none;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0;
      font-family: var(--font);
      transition: color 0.2s ease;
    }
    .tag-remove:hover { color: var(--text-primary); }

    /* ===== OTHER — SINGLE (Country/Language) ===== */
    .other-single-wrap {
      display: none;
      margin-top: 12px;
    }
    .other-single-wrap.visible { display: block; }

    .other-single-wrap input {
      width: 100%;
      max-width: 320px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text-primary);
      font-size: 0.875rem;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s ease;
    }
    .other-single-wrap input:focus { border-color: var(--accent); }

    /* ===== BUTTONS ===== */
    .btn {
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      border: 1px solid transparent;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      line-height: 1.4;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text-primary);
      border-color: var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); }

    /* ===== ACTIONS ROW ===== */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 32px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* ===== DIVIDER ===== */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 32px 0;
    }

    /* ===== SCREEN 4: SUMMARY ===== */
    .summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
    }

    .summary-row {
      display: flex;
      gap: 12px;
      padding: 3px 0;
      font-size: 0.9rem;
    }

    .summary-label {
      color: var(--text-secondary);
      min-width: 120px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .summary-value { color: var(--text-primary); }

    /* ===== PROMPT TEXTAREA ===== */
    textarea.prompt-area {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      background: var(--surface);
      color: var(--text-primary);
      font-size: 0.9rem;
      line-height: 1.7;
      font-family: monospace;
      resize: none;
      outline: none;
      overflow: hidden;
      transition: border-color 0.2s ease;
      display: block;
    }
    textarea.prompt-area:focus { border-color: var(--accent); }

    /* ===== SECTION LABEL ===== */
    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 12px;
      margin-top: 32px;
    }

    /* ===== AI ASSISTANTS ===== */
    .ai-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ai-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: border-color 0.2s ease;
    }
    .ai-link:hover { border-color: var(--accent); }

    .ai-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ai-icon svg { display: block; }

    /* ===== USEFUL LINKS ===== */
    .useful-links { margin-top: 8px; }
    .useful-links a {
      display: block;
      color: var(--accent);
      font-size: 0.875rem;
      text-decoration: none;
      margin-bottom: 8px;
    }
    .useful-links a:hover { text-decoration: underline; }

    /* ===== GITHUB ===== */
    .github-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .github-section a {
      color: var(--text-secondary);
      font-size: 0.875rem;
      text-decoration: none;
    }

    @media (max-width: 540px) {
      h1 { font-size: 1.4rem; }
      .container { padding: 60px 16px 48px; }
      .summary-label { min-width: 80px; font-size: 0.85rem; }
      .summary-value { font-size: 0.85rem; }
    }

  // ============================================================
  // THEME
  // ============================================================
  function initTheme() {
    const saved = localStorage.getItem('theme');
    const isDark = saved === 'dark';
    if (isDark) document.documentElement.setAttribute('data-theme', 'dark');
    updateThemeBtn(isDark);
  }

  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
      updateThemeBtn(false);
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
      updateThemeBtn(true);
    }
  }

  function updateThemeBtn(isDark) {
    document.getElementById('themeToggle').innerHTML = isDark
      ? '&#9728; Light'
      : '&#9790; Dark';
  }

  // ============================================================
  // PROGRESS BAR
  // ============================================================
  function setProgress(step) {
    const widths = { 1: '25%', 2: '50%', 3: '75%', 4: '100%' };
    document.getElementById('progressBar').style.width = widths[step] || '25%';
  }

  // ============================================================
  // URL STATE
  // ============================================================
  function readURL() {
    const p = new URLSearchParams(window.location.search);
    const phoneStr = p.get('phone') || '';
    const phones = phoneStr ? phoneStr.split(',').map(s => s.trim()).filter(Boolean) : [];
    const country = p.get('country') || null;
    const lang = p.get('lang') || null;
    return { phones, country, lang };
  }

  function writeURL(phones, country, lang) {
    const p = new URLSearchParams();
    if (phones && phones.length) p.set('phone', phones.join(','));
    if (country) p.set('country', country);
    if (lang) p.set('lang', lang);
    const qs = p.toString();
    const url = window.location.pathname + (qs ? '?' + qs : '');
    window.history.replaceState({}, '', url);
  }

  function clearURL() {
    window.history.replaceState({}, '', window.location.pathname);
  }

  function showScreen(n) {

    currentScreen = n;
    setProgress(n);
    window.scrollTo(0, 0);

      .replace(/&/g, '&amp;')

      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function autoResize(ta) {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  }

  // ============================================================
  // SCREEN 1 — SMARTPHONE SELECTION
  // ============================================================
  let s1SelectedChips = [];  // selected chip values
  let s1Tags = [];           // Other tags

  function renderScreen1() {
    // Derive initial state from appPhones
    const chipSet = new Set(CONFIG.phones.chips);
    s1SelectedChips = appPhones.filter(p => chipSet.has(p));
    s1Tags = appPhones.filter(p => !chipSet.has(p));

    const otherActive = s1Tags.length > 0;

    // Build chips HTML
    let chipsHtml = '';
    CONFIG.phones.chips.forEach(phone => {
      const active = s1SelectedChips.includes(phone) ? ' active' : '';
      chipsHtml += `<button class="chip${active}" onclick="s1ToggleChip(this, '${esc(phone)}')">${esc(phone)}</button>`;
    });
    chipsHtml += `<button class="chip${otherActive ? ' active' : ''}" id="s1OtherBtn" onclick="s1ToggleOther()">Other</button>`;

    // Build tags HTML
    let tagsHtml = s1Tags.map((t, i) =>
      `<span class="tag">${esc(t)}<button class="tag-remove" onclick="s1RemoveTag(${i})" title="Remove">&times;</button></span>`
    ).join('');

    // Datalist
    const dlHtml = CONFIG.phones.autocomplete.map(p => `<option value="${esc(p)}">`).join('');

    document.getElementById('screen1').innerHTML = `
      <p class="step-indicator">STEP 1 OF 4 &middot; SMARTPHONE</p>
      <h1>Find a Smartphone Without Ads, Bloatware &amp; Spyware</h1>
      <p class="subtitle">Generate a research prompt for AI based on real Reddit reviews and user reports</p>
      <p class="hint">Select one to analyze or multiple to compare</p>

      <div class="chips" id="s1Chips">${chipsHtml}</div>

      <div class="other-row${otherActive ? ' visible' : ''}" id="s1OtherRow">
        <input type="text" id="s1OtherInput" list="s1Datalist" placeholder="Type a phone model..." autocomplete="off">
        <datalist id="s1Datalist">${dlHtml}</datalist>
        <button class="btn btn-secondary" onclick="s1AddTag()">Add</button>
      </div>

      <div class="tags" id="s1Tags">${tagsHtml}</div>

      <div class="actions">
        <button class="btn btn-primary" onclick="s1Next()">Next</button>
        <button class="btn btn-secondary" onclick="s1Skip()">Skip</button>
      </div>
    `;

    // Bind Enter on input
    const inp = document.getElementById('s1OtherInput');
    if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); s1AddTag(); } });
  }

  function s1ToggleChip(btn, phone) {
    const idx = s1SelectedChips.indexOf(phone);
    if (idx >= 0) {
      s1SelectedChips.splice(idx, 1);
      btn.classList.remove('active');
    } else {
      s1SelectedChips.push(phone);
      btn.classList.add('active');
    }
  }

  function s1ToggleOther() {
    const row = document.getElementById('s1OtherRow');
    const btn = document.getElementById('s1OtherBtn');
    const isVisible = row.classList.contains('visible');
    if (isVisible) {
      row.classList.remove('visible');
      btn.classList.remove('active');
      s1Tags = [];
      renderS1Tags();
    } else {
      row.classList.add('visible');
      btn.classList.add('active');
      document.getElementById('s1OtherInput').focus();
    }
  }

  function s1AllPhones() {
    return [...s1SelectedChips, ...s1Tags];
  }

  function s1AddTag() {
    const inp = document.getElementById('s1OtherInput');
    if (!inp) return;
    const val = inp.value.trim();
    if (!val) return;
    // Deduplicate
    const all = s1AllPhones();
    if (all.map(p => p.toLowerCase()).includes(val.toLowerCase())) {
      inp.value = '';
      inp.focus();
      return;
    }
    s1Tags.push(val);
    inp.value = '';
    inp.focus();
    renderS1Tags();
  }

  function s1RemoveTag(idx) {
    s1Tags.splice(idx, 1);
    if (s1Tags.length === 0) {
      // Keep Other active if user manually removes all tags — Other row stays open
    }
    renderS1Tags();
  }

  function renderS1Tags() {
    const container = document.getElementById('s1Tags');
    if (!container) return;
    container.innerHTML = s1Tags.map((t, i) =>
      `<span class="tag">${esc(t)}<button class="tag-remove" onclick="s1RemoveTag(${i})" title="Remove">&times;</button></span>`
    ).join('');
  }

  function s1Next() {
    appPhones = s1AllPhones();
    writeURL(appPhones, appCountry, appLang);
    showScreen(2);
    renderScreen2();
  }

  function s1Skip() {
    appPhones = [];
    writeURL([], appCountry, appLang);
    showScreen(2);
    renderScreen2();
  }

  // ============================================================
  // SCREEN 2 — COUNTRY SELECTION
  // ============================================================
  let s2SelectedCountry = null;
  let s2OtherActive = false;

  function renderScreen2() {
    s2SelectedCountry = appCountry;

        <button class="btn btn-secondary" onclick="s2Skip()">Skip</button>
        <button class="btn btn-secondary" onclick="goBack(1)">Back</button>
      </div>
    `;
  }

    s2OtherActive = false;

  function s2ToggleOther() {

    writeURL(appPhones, appCountry, appLang);
    showScreen(3);
    renderScreen3();
  }

  function s2Skip() {
    appCountry = null;
    writeURL(appPhones, null, appLang);
    showScreen(3);
    renderScreen3();
  }

  // ============================================================
  // SCREEN 3 — LANGUAGE SELECTION
  // ============================================================
  let s3SelectedLang = null; // label string
  let s3OtherActive  = false;

  function renderScreen3() {
    const browserCode = (navigator.language || '').split('-')[0].toLowerCase();
    const browserMatch = CONFIG.languages.chips.find(l => l.code === browserCode);

    // Restore state: check if appLang matches a chip label
    const chipLabels = CONFIG.languages.chips.map(l => l.label);
    s3OtherActive = appLang !== null && !chipLabels.includes(appLang);
    s3SelectedLang = s3OtherActive ? null : appLang;

    let chipsHtml = '';
    CONFIG.languages.chips.forEach(lang => {
      const isActive = (!s3OtherActive && s3SelectedLang === lang.label) ? ' active' : '';
      const isRecommended = (browserMatch && browserMatch.code === lang.code);
      const label = isRecommended
        ? `${esc(lang.label)} <span style="font-size:0.75rem;opacity:0.75">(your browser language)</span>`
        : esc(lang.label);
      chipsHtml += `<button class="chip${isActive}" onclick="s3SelectChip('${esc(lang.label)}')">${label}</button>`;
    });
    chipsHtml += `<button class="chip${s3OtherActive ? ' active' : ''}" id="s3OtherBtn" onclick="s3ToggleOther()">Other</button>`;

      <p class="subtitle">The generated prompt will ask the AI to respond in this language</p>

      <div class="other-single-wrap${s3OtherActive ? ' visible' : ''}" id="s3OtherWrap">

        <datalist id="s3Datalist">${dlHtml}</datalist>
      </div>

      <div class="actions">

    }
    writeURL(appPhones, appCountry, appLang);

  // ============================================================
  // SCREEN 4 — RESULT
  // ============================================================
  function renderScreen4() {
    const phones  = appPhones;
    const country = appCountry;
    const lang    = appLang;

    const phoneLabel = phones.length > 1 ? 'Smartphones' : 'Smartphone';
    const phoneVal   = phones.length ? phones.join(', ') : 'Not specified';
    const countryVal = country || 'Not specified';
    const langVal    = lang || 'Not specified';

    const prompt = generatePrompt(phones, country, lang);

    // AI assistants
    let aiHtml = CONFIG.ai_assistants.map(ai => `
      <a class="ai-link" href="${esc(ai.url)}" target="_blank" rel="noopener noreferrer">
        <span class="ai-icon"><img src="${esc(ai.icon)}" alt="${esc(ai.name)}" width="32" height="32"></span>
        <span>${esc(ai.name)}</span>
      </a>
    `).join('');

    // Placeholder links
    let linksHtml = CONFIG.placeholder_links.map(l =>
      `<a href="${esc(l.url)}">${esc(l.text)}</a>`
    ).join('');

    document.getElementById('screen4').innerHTML = `
      <p class="step-indicator">STEP 4 OF 4 &middot; YOUR PROMPT</p>
      <h1>Your Research Prompt</h1>
      <p class="subtitle">Copy the prompt below and paste it into any AI assistant</p>

      <div class="summary">
        <div class="summary-row">
          <span class="summary-label">${esc(phoneLabel)}</span>
          <span class="summary-value">${esc(phoneVal)}</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">Country</span>
          <span class="summary-value">${esc(countryVal)}</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">Language</span>
          <span class="summary-value">${esc(langVal)}</span>
        </div>
      </div>

      <textarea class="prompt-area" id="promptTextarea" readonly>${esc(prompt)}</textarea>

      <div class="actions">
        <button class="btn btn-primary" id="copyBtn" onclick="copyPrompt()">Copy Prompt</button>
        <button class="btn btn-secondary" id="shareBtn" onclick="sharePrompt()">Share</button>
        <button class="btn btn-secondary" onclick="goBack(3)">Back</button>
        <button class="btn btn-secondary" onclick="startOver()">Start Over</button>
      </div>

      <p class="section-label">Open in AI Assistant</p>
      <div class="ai-links">${aiHtml}</div>

      <p class="section-label">Useful Links</p>
      <div class="useful-links">${linksHtml}</div>

      <div class="github-section">
        <a href="${esc(CONFIG.github_url)}" target="_blank" rel="noopener noreferrer">View on GitHub</a>
      </div>
    `;

    // Auto-resize textarea
    const ta = document.getElementById('promptTextarea');
    if (ta) {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    }
  }

  function copyPrompt() {
    const ta = document.getElementById('promptTextarea');
    if (!ta) return;
    navigator.clipboard.writeText(ta.value).then(() => {
      const btn = document.getElementById('copyBtn');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    }).catch(() => {
      // Fallback
      ta.select();
      document.execCommand('copy');
      const btn = document.getElementById('copyBtn');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    });
  }

  function sharePrompt() {
    const url = window.location.href;
    const btn = document.getElementById('shareBtn');
    if (navigator.share) {
      navigator.share({ url: url }).catch(() => {});
    } else {
      navigator.clipboard.writeText(url).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Link Copied!';
        setTimeout(() => { btn.textContent = orig; }, 2000);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const orig = btn.textContent;
        btn.textContent = 'Link Copied!';
        setTimeout(() => { btn.textContent = orig; }, 2000);
      });
    }
  }

  // ============================================================
  // BACK NAVIGATION
  // ============================================================
  function goBack(toScreen) {
    showScreen(toScreen);
    if (toScreen === 1) renderScreen1();
    if (toScreen === 2) renderScreen2();
    if (toScreen === 3) renderScreen3();
  }

  function startOver() {
    appPhones  = [];
    appCountry = null;
    appLang    = null;
    clearURL();
    showScreen(1);
    renderScreen1();
  }

  // ============================================================
  // PROMPT GENERATION
  // ============================================================
  function generatePrompt(phones, country, lang) {
    const hasPhones   = phones.length > 0;
    const hasCountry  = !!country;
    const hasLang     = !!lang;
    const isMultiple  = phones.length > 1;
    const isSingle    = phones.length === 1;

    const langLine = hasLang
      ? `Please provide your entire response in ${lang}.`
      : 'Please provide your response in English.';

    const regionNote = hasCountry
      ? `Pay particular attention to the ${country} market: regional firmware variants, local availability, country-specific feature restrictions, and user complaints reported by ${country}-based users.`
      : '';

    const noFabricate =
      'Important: Do not fabricate facts, make unsourced assumptions, or present unverified information. Base your entire response exclusively on documented user experiences, real discussions from Reddit and other public forums, verified consumer reviews, and independent publications. If information on a specific aspect is scarce or unavailable, state that explicitly rather than filling the gap with speculation.';

    // ---- VARIANT: nothing or language only ----
    if (!hasPhones && !hasCountry) {
      return [
        'I need your help finding a modern smartphone that is free of intrusive advertising, pre-installed bloatware, spyware, and persistent hardware issues. Please base your research and recommendations exclusively on real user reports, Reddit discussions, tech forums, and verified independent publications — not on marketing materials or manufacturer claims.',
        noFabricate,
        'Please evaluate and recommend smartphones based on the following aspects:',
        'Hardware reliability: Identify models that have documented issues with overheating during normal use and under sustained load, CPU or GPU throttling after prolonged activity, accelerated battery degradation, recurring component failures, or significant build quality problems. Prioritize models with a strong track record in this area.',
        'Software quality: Look for evidence of app freezes, system crashes, unstable firmware updates, post-update bugs that degraded performance, poor RAM management, and aggressive background process killing. Recommend models with a history of stable, well-maintained software.',
        'Advertising and privacy: Identify which current smartphones ship without built-in advertising in the system UI. Confirm that the stock firmware does not contain known spyware or adware, does not silently install apps, does not prevent removal of intrusive system apps, and does not collect or transmit user data without clear informed consent.',
        'Proximity sensor integrity: For each recommended model, verify whether it uses a dedicated hardware infrared proximity sensor or relies on software emulation through the accelerometer or ambient light sensor. If software emulation is used, describe documented user complaints about screen behavior during calls — such as unintended screen activation or failure to turn off.',
        'Regional differences: Note whether any recommended model has firmware variants that differ significantly by market, including regional restrictions, additional pre-installed apps, or removed features in certain regions.',
        'Time on market: For any model available for less than one year, explicitly state that the volume of independent long-term reliability reviews is currently insufficient for a complete assessment.',
        'Recommended alternatives: Provide a list of specific current models that perform well across all of the above criteria, with a brief note on why each is recommended.',
        langLine
      ].join('\n\n');
    }

    // ---- VARIANT: country only (no phones) ----
    if (!hasPhones && hasCountry) {
      return [
        `I need your help finding a smartphone that is currently available in ${country} and is free of intrusive advertising, pre-installed bloatware, spyware, and persistent hardware problems. Please base your research and recommendations exclusively on real user reports, Reddit discussions, tech forums, and verified independent publications — not on marketing materials or manufacturer claims.`,
        noFabricate,
        `Focus specifically on the ${country} market throughout your analysis. Please evaluate and recommend smartphones based on the following aspects:`,
        `Regional availability and firmware: Identify which models are officially sold in ${country} and whether their regional firmware variants differ from global versions. Note any features restricted, removed, or added in the ${country} version, and any additional bloatware specific to the regional build.`,
        `Hardware reliability: Identify models available in ${country} with documented issues related to overheating during normal use or sustained load, CPU or GPU throttling, accelerated battery degradation, recurring component failures, or build quality problems. Recommend models with a strong reliability record among users in ${country}.`,
        `Software quality: Review evidence from ${country}-based users regarding app freezes, system crashes, unstable firmware updates, post-update regressions, poor RAM management, and aggressive background process termination.`,
        `Advertising and privacy: Verify which models available in ${country} ship without built-in advertising in the system UI, without confirmed spyware or adware in stock firmware, without forced app installations, and with the ability to fully uninstall or disable intrusive system apps. Note any privacy concerns specific to the ${country} firmware variant.`,
        `Proximity sensor integrity: For each model under consideration, verify whether it uses a dedicated hardware infrared proximity sensor or software emulation. If emulation is used, describe real user reports of screen misbehavior during calls.`,
        `Time on market: For any model available for less than one year, explicitly note that long-term independent reviews are insufficient for a complete reliability assessment.`,
        `Recommended models for ${country}: Provide a list of specific models currently available in ${country} that perform well across all of the above criteria, with a brief reason for each recommendation.`,
        langLine
      ].join('\n\n');
    }

    // ---- VARIANT: single model ----
    if (isSingle) {
      const model = phones[0];
      const regionContext = hasCountry
        ? ` in the context of the ${country} market`
        : '';
      return [
        `Please research the ${model}${regionContext} and provide a thorough analysis based exclusively on real user reports, Reddit discussions, tech forums, and verified independent publications. Do not rely on manufacturer specifications, press releases, or marketing content. I want to know whether this phone is genuinely clean and reliable in everyday use.`,
        noFabricate,
        regionNote,
        `Hardware issues: Review all documented reports of overheating during normal daily use and under sustained load. Identify any confirmed CPU or GPU throttling behavior after extended activity. Look for patterns of accelerated battery degradation, recurring component failures, and structural or build quality complaints from real users.`,
        `Software issues: Search for reports of app freezes, system crashes, firmware instability, and bugs introduced by over-the-air updates. Identify whether performance has degraded over time according to long-term users. Analyze how the phone handles RAM under multitasking and whether background apps are killed aggressively or unpredictably.`,
        `Advertising and privacy: Verify whether the stock firmware of the ${model} displays advertising within the system UI. Confirm or deny the presence of spyware, adware, or telemetry modules in the default firmware. Check whether the device installs apps without user consent, and whether intrusive system apps can be fully disabled or uninstalled. Document any known cases of data collection or transmission without clear user consent.`,
        `Proximity sensor: Determine whether the ${model} uses a dedicated hardware infrared proximity sensor or relies on software emulation via the accelerometer or ambient light sensor. If a virtual proximity sensor is used, document actual user complaints about incorrect screen behavior during phone calls, such as the screen staying on during a call or activating accidentally.`,
        hasCountry
          ? `Regional firmware for ${country}: Describe how the ${country} version of the ${model} differs from the global version. Note any regional feature restrictions, additional pre-installed apps, or removed features in the ${country} firmware.`
          : `Regional differences: Note whether firmware variants for the ${model} differ significantly between markets, and whether any regional version has additional restrictions, bloatware, or removed features compared to the global release.`,
        `Time on market: If the ${model} has been commercially available for less than one year, explicitly state this and warn that the current volume of independent long-term reviews is insufficient for a complete reliability assessment.`,
        `Alternatives: Based on the issues found above, suggest at least three specific alternative models that do not share the same problems${hasCountry ? ` and are available in ${country}` : ''}. Briefly explain why each alternative is a better choice in the areas where the ${model} falls short.`,
        langLine
      ].join('\n\n');
    }

    // ---- VARIANT: multiple models ----
    if (isMultiple) {
      const modelList = phones.join(', ');
      const modelsEnum = phones.map((m, i) => `${i + 1}. ${m}`).join('\n');
      return [
        `Please conduct a detailed comparative analysis of the following smartphones based exclusively on real user reports, Reddit discussions, tech forums, and verified independent publications. Do not use manufacturer specifications, press releases, or marketing content. Structure your entire response by aspect, not by model — meaning you compare all phones within each category before moving to the next.`,
        `Models to compare:\n${modelsEnum}`,
        noFabricate,
        regionNote,
        `Hardware comparison: For each of the models listed above, review and compare documented reports of overheating during normal daily use and under sustained load, CPU or GPU throttling after extended activity, battery degradation rates based on long-term user reports, recurring component failures, and build quality complaints. Identify which model has the strongest and weakest hardware reliability record according to real users.`,
        `Software comparison: For each model, compare evidence of app freezes, system crashes, firmware instability, bugs introduced by updates, performance degradation over time, and the quality of RAM management and background process handling. Identify which models have a history of stable software and which have recurring software problems.`,
        `Advertising and privacy comparison: For each model, document whether the stock firmware contains advertising in the system UI, whether spyware or adware has been confirmed in the firmware, whether apps are installed without user consent, whether intrusive system apps can be removed, and whether data collection without explicit consent has been reported. Rate each model on cleanliness and transparency.`,
        `Proximity sensor comparison: For each model, determine whether it uses a dedicated hardware infrared proximity sensor or software emulation. For any model using software emulation, document real user complaints about screen behavior during phone calls.`,
        hasCountry
          ? `Regional comparison for ${country}: For each model, describe how the ${country} firmware variant differs from the global version. Note regional feature restrictions, additional bloatware, and user complaints specific to the ${country} market for each model.`
          : `Regional differences comparison: For each model, note whether regional firmware variants differ significantly between markets, and highlight any versions with particularly notable restrictions, additional bloatware, or removed features.`,
        `Time on market: For any model in this comparison that has been available for less than one year, explicitly state this and note that the volume of independent long-term reviews is currently insufficient for a complete reliability assessment.`,
        `Summary recommendation: Based solely on the real user experience data gathered above — not on technical specifications — provide a clear recommendation of which model among ${modelList} is the best overall choice and why. If the answer differs depending on specific priorities (such as clean software versus hardware durability), explain that clearly. ${hasCountry ? `Take into account availability and regional specifics for ${country}.` : ''} If independent review data is insufficient for one or more models to draw a confident conclusion, state that explicitly.`,
        langLine
      ].join('\n\n');
    }

    // Fallback
    return langLine;
  }

  // ============================================================
  // INITIALIZATION
  // ============================================================
  function init() {
    initTheme();

    const { phones, country, lang } = readURL();
    appPhones  = phones;
    appCountry = country;
    appLang    = lang;

    // Determine starting screen from URL params
    const hasAnyParam = phones.length > 0 || country !== null || lang !== null;
    if (hasAnyParam) {
      // Show screen 4 (result) if all three params are potentially set, else screen 4 as well since we have data
      // Per spec: on reload, restore state and show corresponding screen
      // Simplest interpretation: if params exist, go to screen 4 (the result)
      showScreen(4);
      renderScreen4();
    } else {
      showScreen(1);
      renderScreen1();
    }
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
